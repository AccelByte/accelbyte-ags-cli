name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "accelbyte-ags-cli") | .version')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    # macos-latest currently resolves to arm64 (macos-14). x86_64-apple-darwin
    # is built as a true cross-compile via the installed Rust target; if
    # macos-latest ever changes architecture, both macOS entries still build
    # correctly because both targets are explicitly installed below.
    strategy:
      fail-fast: false
      matrix:
        include:
          # All Linux targets use cross to build against an older glibc/musl
          # base image, so binaries run on distros older than the runner.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ags
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: ags
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: ags
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: ags
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ags
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ags
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ags.exe
            archive: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2
        with:
          tool: cross@0.2.5

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --locked
          else
            cargo build --release --target ${{ matrix.target }} --locked
          fi

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp README.md dist/ || true
          cp LICENSE* dist/ || true
          tar -czf ags-${{ matrix.target }}.tar.gz -C dist .
          shasum -a 256 ags-${{ matrix.target }}.tar.gz > ags-${{ matrix.target }}.tar.gz.sha256

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          Copy-Item README.md dist/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE* dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath ags-${{ matrix.target }}.zip
          $hash = (Get-FileHash "ags-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ags-${{ matrix.target }}.zip" | Out-File -Encoding ascii "ags-${{ matrix.target }}.zip.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ags-${{ matrix.target }}.${{ matrix.archive }}
            ags-${{ matrix.target }}.${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
